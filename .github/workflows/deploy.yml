name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - main
    # Nếu bạn dùng monorepo và file này được đặt ở `.github/workflows/deploy.yml`
    # paths:
    #   - 'task-manager-fe/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Thiết lập working directory nếu code frontend nằm trong thư mục task-manager-fe
    defaults:
      run:
        working-directory: . # Thay bằng ./task-manager-fe nếu file này ở root của monorepo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Thay đổi version tùy theo dự án của bạn
          cache: 'npm'
          # cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Đặt các biến môi trường cần thiết cho quá trình build tại đây
          # VITE_API_URL: ${{ secrets.VITE_API_URL }}
          NODE_ENV: production

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }} # Ví dụ: ap-southeast-1

      - name: Deploy to S3
        # Đẩy thư mục dist lên S3 bucket
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        # Xóa cache trên CloudFront để cập nhật bản mới nhất
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
